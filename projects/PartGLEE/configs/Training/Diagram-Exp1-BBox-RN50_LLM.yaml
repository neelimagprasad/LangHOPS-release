_BASE_: "../base_clip_frozen_image_r50.yaml"
MODEL:
  WEIGHTS: "projects/PartGLEE/checkpoint/PartGLEE_converted_from_GLEE_RN50.pth"
  SEM_SEG_HEAD:
    NAME: "MaskDINOHead"
    IGNORE_VALUE: 255
    NUM_CLASSES: 531
  TEXT:
    ARCH: clip_teacher
  MaskDINO:
    BOX_LOSS: True
    MASK_WEIGHT: 0.0
    DICE_WEIGHT: 0.0
    NUM_OBJECT_QUERIES: 300
    NUM_PART_QUERIES: 10
    UNIFY_OBJECT_PART: True
    Q_FORMER: False
    OBJECT_PART_DECODER_LAYERS: 6
  LLM:
    USE_LLM: False
    DEBUG: False
    LLM_TYPE: "microsoft/phi-1.5"
    LLM_PATH: ""
    LLM_CONVERSATION_TYPE: "llava_phi"
    HIDDEN_SIZE: 2048
    IMG_PROJ_INDIMS: 256
    PART_QUERY_MODE: "clip_query"
    PART_CLS_EMBED: "learnable"
    CLIP_EMB_PART_ATTEN_MASK: False
    VLM:
      IS_VLM: True
    LORA:
      R: 8
      ALPHA: 16
      DROPOUT: 0.05
      TARGET_MODULES: ["self_attn.q_proj", "self_attn.v_proj"]
DATASETS:
  TRAIN: ("diagram_joint_train",)
  TEST: ("diagram_joint_val",)
SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.00005
  STEPS: (6000,)
  MAX_ITER: 9000
  CHECKPOINT_PERIOD: 1000
TEST:
  EVAL_PERIOD: 1000
INPUT:
  IMAGE_SIZE: 1024
  MIN_SCALE: 0.1
  MAX_SCALE: 2.0
  FORMAT: "RGB"
  DATASET_MAPPER_NAME: "joint_image_lsj"
DATALOADER:
  FILTER_EMPTY_ANNOTATIONS: True
  NUM_WORKERS: 4
OUTPUT_DIR: projects/PartGLEE/output/Training/Diagram-Exp1-BBox-RN50/
