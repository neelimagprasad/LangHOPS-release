_BASE_: "../base_clip_frozen_image_r50.yaml"
SEED: 42
FIND_UNUSED_PARAMETERS: True
MODEL:
  WEIGHTS: "projects/PartGLEE/checkpoint/PartGLEE_converted_from_GLEE_RN50.pth"
  SEM_SEG_HEAD:
    NAME: "MaskDINOHead"
    IGNORE_VALUE: 255
    NUM_CLASSES: 531
  TEXT:
    ARCH: clip_teacher
  MaskDINO:
    BOX_LOSS: True
    MASK_WEIGHT: 0.0
    DICE_WEIGHT: 0.0
    CLASS_WEIGHT: 2.0
    BOX_WEIGHT: 5.0
    GIOU_WEIGHT: 2.0
    NO_OBJECT_WEIGHT: 0.1
    NUM_OBJECT_QUERIES: 300
    TOPK_OBJECT_QUERIES: 150
    NUM_PART_QUERIES: 10
    UNIFY_OBJECT_PART: True
    Q_FORMER: False
    OBJECT_PART_DECODER_LAYERS: 6
  LLM:
    USE_LLM: False
    DEBUG: False
    LLM_TYPE: "microsoft/phi-1.5"
    LLM_PATH: ""
    LLM_CONVERSATION_TYPE: "llava_phi"
    HIDDEN_SIZE: 2048
    IMG_PROJ_INDIMS: 256
    PART_QUERY_MODE: "clip_query"
    PART_CLS_EMBED: "learnable"
    CLIP_EMB_PART_ATTEN_MASK: False
    VLM:
      IS_VLM: True
    LORA:
      R: 8
      ALPHA: 16
      DROPOUT: 0.05
      TARGET_MODULES: ["self_attn.q_proj", "self_attn.v_proj"]
DATASETS:
  TRAIN: ("diagram_joint_train",)
  TEST: ()
SOLVER:
  OPTIMIZER: "ADAMW"
  IMS_PER_BATCH: 8
  BASE_LR: 0.0001
  WEIGHT_DECAY: 0.0001
  BACKBONE_MULTIPLIER: 0.1
  TEXTENCODER_MULTIPLIER: 1.0
  STEPS: (8000, 10000)
  MAX_ITER: 12000
  GAMMA: 0.1
  WARMUP_ITERS: 1000
  WARMUP_FACTOR: 0.001
  CHECKPOINT_PERIOD: 1000
  CLIP_GRADIENTS:
    ENABLED: False
TEST:
  EVAL_PERIOD: 0
INPUT:
  IMAGE_SIZE: 512
  MIN_SCALE: 0.1
  MAX_SCALE: 2.0
  FORMAT: "RGB"
  DATASET_MAPPER_NAME: "joint_image_lsj"
DATALOADER:
  FILTER_EMPTY_ANNOTATIONS: True
  NUM_WORKERS: 4
OUTPUT_DIR: projects/PartGLEE/output/Training/Diagram-Exp1-Pretrain-RN50/
